[package]
name = "noir-browser"
version = "0.7.0"
edition = "2021"

[dependencies]
ash = "0.37"
winit = "0.28"
ash-window = "0.12"
raw-window-handle = "0.5"
tokio = { version = "1", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
fontdue = "0.9.3"
shaderc = "0.10.1"
gpu-allocator = { version = "0.26", features = ["vulkan"] }
html5ever = "0.39.0"
markup5ever_rcdom = "0.39.0"
reqwest = { version = "0.13.3", features = ["rustls"] }
url = "2.5"
image = { version = "0.24", default-features = false, features = ["png", "jpeg", "webp"] }
